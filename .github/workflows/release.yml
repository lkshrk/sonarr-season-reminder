name: Release

on:
  schedule:
    - cron: '0 12 * * 1' # Every Monday at 12:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Skip CI preflight check and release anyway'
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  attestations: write
  id-token: write

jobs:
  release:
    name: Build, Release & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify latest CI Pipeline on main succeeded
        if: ${{ !inputs.force }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CONCLUSION=$(gh run list \
            --workflow "CI Pipeline" \
            --branch main \
            --event push \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion')
          echo "Latest CI Pipeline conclusion on main: ${CONCLUSION:-<none>}"
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::Latest CI Pipeline run on main is '$CONCLUSION' — refusing to release."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (validate Dockerfile before tagging)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:release-candidate
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Semantic Release
        id: semrel
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        if: steps.semrel.outputs.new_release_published == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push versioned image
        if: steps.semrel.outputs.new_release_published == 'true'
        env:
          VERSION: ${{ steps.semrel.outputs.new_release_version }}
        run: |
          set -euo pipefail
          SRC="${REGISTRY}/${IMAGE_NAME}:release-candidate"
          docker tag "$SRC" "${REGISTRY}/${IMAGE_NAME}:v${VERSION}"
          docker tag "$SRC" "${REGISTRY}/${IMAGE_NAME}:latest"
          docker push "${REGISTRY}/${IMAGE_NAME}:v${VERSION}"
          docker push "${REGISTRY}/${IMAGE_NAME}:latest"
